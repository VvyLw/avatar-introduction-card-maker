name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - "src/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout masterthesis repo
        uses: actions/checkout@v4

      - name: Deploy html
        run: |
          mkdir -p avatar_card_maker
          cp -r src/* avatar_card_maker/

      - name: Push to vvylw.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: vvylw/vvylw.github.io
          publish_branch: master
          publish_dir: ./avatar_card_maker
          destination_dir: avatar_card_maker
          personal_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}